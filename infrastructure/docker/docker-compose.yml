# ============================================================
# QuantLab Infrastructure — Docker Compose
# ============================================================
# MVP 阶段基础设施：PostgreSQL + TimescaleDB + Redis + Kafka + MinIO
# 参考：Documents/Deployment/QuantLab Deployment Architecture v1.0.md
# 参考：Documents/Standard/QuantLab Database Design Standard v1.0.md
# ============================================================


networks:
  quantlab-net:
    name: quantlab-net
    driver: bridge

volumes:
  postgresql-data:
    driver: local
  redis-data:
    driver: local
  kafka-data:
    driver: local
  minio-data:
    driver: local

services:

  # ============================================================
  # PostgreSQL + TimescaleDB
  # ============================================================
  postgresql:
    image: timescale/timescaledb:2.19.0-pg16
    container_name: quantlab-postgresql
    restart: unless-stopped
    networks:
      - quantlab-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantlab_dev}
      POSTGRES_DB: ${POSTGRES_DB:-quantlab_platform}
      # TimescaleDB 优化
      TIMESCALEDB_TELEMETRY: off
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantlab}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ============================================================
  # Redis
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: quantlab-redis
    restart: unless-stopped
    networks:
      - quantlab-net
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-quantlab_dev}
      --appendonly yes
      --appendfsync everysec
      --save 3600 1
      --save 300 100
      --save 60 10000
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.3"
          memory: 128M

  # ============================================================
  # Kafka (KRaft mode — no ZooKeeper)
  # ============================================================
  kafka:
    image: apache/kafka:4.0.0
    container_name: quantlab-kafka
    restart: unless-stopped
    networks:
      - quantlab-net
    ports:
      - "9092:9092"
    environment:
      # KRaft 模式
      KAFKA_NODE_ID: ${KAFKA_BROKER_ID:-1}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # Listener
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Topic
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Log
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Heap
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ============================================================
  # Kafka UI — 消息队列管理界面
  # ============================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: quantlab-kafka-ui
    restart: unless-stopped
    networks:
      - quantlab-net
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: quantlab
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: ""
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ============================================================
  # MinIO — S3 兼容对象存储
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: quantlab-minio
    restart: unless-stopped
    networks:
      - quantlab-net
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-quantlab}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-quantlab_dev}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.3"
          memory: 128M

  # ============================================================
  # MinIO Client — 初始化 Bucket
  # ============================================================
  minio-init:
    image: minio/mc:latest
    container_name: quantlab-minio-init
    restart: "no"
    networks:
      - quantlab-net
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-quantlab}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-quantlab_dev}
    entrypoint: >
      /bin/sh -c "
      mc alias set quantlab http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb -p quantlab/user;
      mc mb -p quantlab/strategy;
      mc mb -p quantlab/portfolio;
      mc mb -p quantlab/backtest;
      mc mb -p quantlab/community;
      mc mb -p quantlab/ai;
      mc anonymous set download quantlab/user;
      echo 'MinIO buckets initialized';
      "
