Name: formula.rpc
ListenOn: 0.0.0.0:8080
HttpPort: 8081
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: formula.rpc

RedisCache:
  Host: localhost
  Port: 6379
  Pass: ""
  DB: 0
  TTL: 86400

Postgres:
  DSN: "postgres://quantlab:quantlab@localhost:5432/quantlab_formula?sslmode=disable"

# MarketData wires the RepositoryDataPort directly against the Market Data
# database. Leave DSN empty in environments where the formula service should
# fall back to the in-memory data port (CI smoke tests, local exploration).
MarketData:
  DSN: "postgres://quantlab:quantlab@localhost:5432/quantlab_market_data?sslmode=disable"
  Adjustment: pre
  MaxOpenConns: 10
  MaxIdleConns: 2

Kafka:
  Brokers:
    - localhost:9092
