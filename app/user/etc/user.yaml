Name: user.rpc
ListenOn: 0.0.0.0:8086
HttpPort: 8087
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: user.rpc

# Postgres holds the User aggregate and the follow ledger. Leave DSN
# empty to fall back to the in-memory store (CI smoke tests, local
# exploration without a database).
Postgres:
  DSN: "postgres://quantlab:quantlab_dev@localhost:5432/quantlab_user?sslmode=disable"
  MaxOpenConns: 10
  MaxIdleConns: 2
  AutoMigrate: true

# Kafka publishes lifecycle events (registered/updated/followed/unfollowed)
# so downstream services (Notification, Ranking, Search) can react.
# Leave Brokers empty to use the no-op publisher locally.
Kafka:
  Brokers: []

# Token configures the JWT issuer. Override Secret in production with a
# value of at least 32 bytes; the placeholder below is fine for local
# exploration only.
Token:
  Secret: "quantlab-user-dev-secret-change-me"
  Issuer: "quantlab.user"
  AccessTTLSeconds: 1800
  RefreshTTLSeconds: 1209600

# Password configures the bcrypt cost. 10 is the default; bump in
# production deployments to balance security and CPU.
Password:
  BcryptCost: 10
