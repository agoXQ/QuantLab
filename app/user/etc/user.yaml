Name: user.rpc
ListenOn: 0.0.0.0:8086
HttpPort: 8087
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: user.rpc

# Postgres holds the User aggregate and the follow ledger. Leave DSN
# empty to fall back to the in-memory store (CI smoke tests, local
# exploration without a database).
Postgres:
  DSN: "postgres://quantlab:quantlab_dev@localhost:5432/quantlab_user?sslmode=disable"
  MaxOpenConns: 10
  MaxIdleConns: 2
  AutoMigrate: true

# Kafka publishes lifecycle events (registered/updated/followed/unfollowed)
# so downstream services (Notification, Ranking, Search) can react.
# Leave Brokers empty to use the no-op publisher locally.
Kafka:
  Brokers: []

# Token configures the JWT issuer. Override Secret in production with a
# value of at least 32 bytes; the placeholder below is fine for local
# exploration only.
# Token configures the JWT issuer. The platform requires HS256 signing
# keys to be at least 32 bytes; a misconfigured Secret / Keys block
# fails the boot loudly instead of issuing weak tokens. Production
# deployments rotate by appending a new entry to Keys, advancing
# ActiveKeyID, and removing the retired secret on a later deploy once
# every issued token has expired.
Token:
  ActiveKeyID: "k1"
  Keys:
    - ID: "k1"
      Secret: "quantlab-user-dev-secret-change-me-now-32"
  Issuer: "quantlab.user"
  AccessTTLSeconds: 1800
  RefreshTTLSeconds: 1209600

# Password configures the bcrypt cost. 10 is the default; bump in
# production deployments to balance security and CPU.
Password:
  BcryptCost: 10

# Cross-service event consumers. Enable to wire user.strategy_count /
# user.backtest_count from upstream services. Default off so a vanilla
# MVP boot does not require Kafka.
StrategySync:
  Enabled: false
  Brokers: []
  Topic: strategy-events
  GroupID: user-strategy-sync

BacktestSync:
  Enabled: false
  Brokers: []
  Topic: backtest-events
  GroupID: user-backtest-sync
