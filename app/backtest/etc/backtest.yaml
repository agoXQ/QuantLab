Name: backtest.rpc
ListenOn: 0.0.0.0:8080
HttpPort: 8082
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: backtest.rpc

# Postgres holds backtest jobs, orders, trades, portfolio snapshots, and
# performance reports. Leave DSN empty to fall back to the in-memory store
# (CI smoke tests, local exploration).
Postgres:
  DSN: "postgres://quantlab:quantlab_dev@localhost:5432/quantlab_backtest?sslmode=disable"
  MaxOpenConns: 10
  MaxIdleConns: 2
  AutoMigrate: true

RedisCache:
  Host: localhost
  Port: 6379
  Pass: quantlab_dev
  DB: 0
  TTL: 86400

Kafka:
  Brokers: []

# MarketData reads bars / financials / factors from the same Postgres
# database the Market Data service writes to. The Backtest engine (via
# FromMarketService) and the Formula evaluator (via RepositoryDataPort)
# both connect through this DSN so end-to-end runs replay real ingested
# data. Leave DSN empty to fall back to the in-memory provider used for
# CI smoke tests and local exploration.
MarketData:
  DSN: "postgres://quantlab:quantlab_dev@localhost:5432/quantlab_market_data?sslmode=disable"
  Adjustment: pre
  MaxOpenConns: 10
  MaxIdleConns: 2

Formula:
  Mode: inprocess

Engine:
  AnnualisationDays: 252
  RiskFreeRate: 0
