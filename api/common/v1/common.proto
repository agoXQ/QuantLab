syntax = "proto3";

package common;

option go_package = "github.com/agoXQ/QuantLab/api/common/v1;commonv1";

message Cursor {
  string next_cursor = 1;
  bool has_more = 2;
}

message PageRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PageResponse {
  int32 total = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ApiResponse {
  int32 code = 1;
  string message = 2;
}

enum Visibility {
  VISIBILITY_UNSPECIFIED = 0;
  PRIVATE = 1;
  PUBLIC = 2;
  UNLISTED = 3;
}

enum Status {
  STATUS_UNSPECIFIED = 0;
  DRAFT = 1;
  PUBLISHED = 2;
  ARCHIVED = 3;
  DELETED = 4;
}
