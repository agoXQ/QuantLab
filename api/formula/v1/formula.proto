syntax = "proto3";

package formula;

option go_package = "github.com/agoXQ/QuantLab/app/formula/pb";

import "api/common/v1/common.proto";

service FormulaService {
  rpc Validate(ValidateRequest) returns (ValidateResponse);
  rpc Compile(CompileRequest) returns (CompileResponse);
  rpc GetAST(GetASTRequest) returns (GetASTResponse);
  rpc ListFunctions(ListFunctionsRequest) returns (ListFunctionsResponse);
  rpc GetFunction(GetFunctionRequest) returns (GetFunctionResponse);
}

message ValidateRequest {
  string formula = 1;
}

message ValidateResponse {
  bool valid = 1;
  int32 error_code = 2;
  string error = 3;
}

message CompileRequest {
  string formula = 1;
}

message CompileResponse {
  string ast_json = 1;
  string plan_json = 2;
  bool valid = 3;
  int32 error_code = 4;
  string error = 5;
}

message GetASTRequest {
  string formula = 1;
}

message GetASTResponse {
  string ast_json = 1;
}

message FunctionDefinition {
  string name = 1;
  string category = 2;
  string return_type = 3;
  string description = 4;
  repeated FunctionParam params = 5;
}

message FunctionParam {
  string name = 1;
  string param_type = 2;
}

message ListFunctionsRequest {}
message ListFunctionsResponse {
  repeated FunctionDefinition functions = 1;
}

message GetFunctionRequest {
  string name = 1;
}
message GetFunctionResponse {
  FunctionDefinition function = 1;
}
